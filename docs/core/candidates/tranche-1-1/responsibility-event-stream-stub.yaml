status: canonicalization_candidate
canonical_status: non_canonical
tranche: "1.1"
purpose: "Minimal candidate Responsibility Event Stream root event stub for review of responsibility-relevant transitions in consequential context"

candidate_root_event_type: boundary_transition_event

required_stub_fields_for_review:
  event_id:
    description: "Candidate unique identifier for the responsibility-relevant event."
    status: candidate_only

  event_type:
    description: "Candidate event type. For this stub, expected to reference boundary_transition_event only as a candidate root event type."
    status: candidate_only

  action_boundary_triggered:
    description: "Candidate marker that Action Boundary handling was triggered or proposed; event emission does not authorize action."
    status: candidate_only

  decision_log_reference:
    description: "Candidate reference to a Decision Log entry when such an entry exists or is required. Nullable during review. This reference supports governance traceability but does not replace Decision Log reasoning."
    status: candidate_only

  timestamp:
    description: "Candidate timestamp of the responsibility-relevant transition."
    status: candidate_only

candidate_fields_under_review_not_required:
  action_class:
    description: "Candidate reference to Action Classes once reviewed. Not required by this stub."
    status: under_review

  boundary_trigger_type:
    description: "Candidate trigger vocabulary under review: reliance, routing, ranking, prioritization, recording_as_rationale_or_basis, escalation, de_escalation, commitment_preparation, or material_decision_field_shaping. Not an enum adoption."
    status: under_review

  responsibility_owner:
    description: "Candidate role or human owner reference. Not required by this stub."
    status: under_review

  responsibility_trace:
    description: "Candidate trace for who proposed, who reviewed, who authorized, and who accepted responsibility. Not required by this stub."
    status: under_review

  ai_prepared_material:
    description: "Candidate reference or summary of AI-prepared material where relevant. Not required by this stub."
    status: under_review

  human_confirmed_rationale:
    description: "Candidate reference or summary of human-confirmed rationale where relevant. Not required by this stub."
    status: under_review

  boundary_status:
    description: "Candidate status of boundary handling. Not required by this stub."
    status: under_review

  source_ref:
    description: "Candidate source or evidence reference. Not required by this stub."
    status: under_review

  consequence_class:
    description: "Candidate consequence class or grouping. Not required by this stub."
    status: under_review

  uncertainty_remaining:
    description: "Candidate uncertainty, limits, or unresolved conditions remaining after review. Not required by this stub."
    status: under_review

  admissibility_rationale:
    description: "Candidate reference or summary of governance reasoning for why action was admissible, limited, refused, escalated, de-escalated, or blocked. Not required by this stub and not a substitute for a Decision Log."
    status: under_review

  authority_status:
    description: "Candidate Human Owner or human governance authority-state marker. Not required by this stub."
    status: under_review

  replay_ref:
    description: "Candidate replay artifact or trace reference. Not required by this stub."
    status: under_review

