  </text>

  <line x1="540" y1="275" x2="650" y2="275" stroke="#EF4444" stroke-width="4"/>

  <rect x="650" y="220" width="200" height="110" rx="22" fill="#2B1012" stroke="#EF4444" stroke-width="2"/>
  <text x="685" y="280" fill="#EF4444" font-size="24" font-family="Arial" font-weight="700">
