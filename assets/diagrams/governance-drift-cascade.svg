  </text>

  <line x1="250" y1="275" x2="340" y2="275" stroke="#FB923C" stroke-width="4"/>

  <rect x="340" y="220" width="200" height="110" rx="22" fill="#2B160A" stroke="#FB923C" stroke-width="2"/>
  <text x="372" y="280" fill="#FB923C" font-size="24" font-family="Arial" font-weight="700">
