<svg width="1600" height="950" viewBox="0 0 1600 950" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="950" fill="#F7FAFC"/>
  <text x="90" y="95" fill="#172033" font-family="Arial" font-size="54" font-weight="700">Human–AI Operational Interface</text>
  <text x="92" y="140" fill="#667085" font-family="Arial" font-size="24">Translating machine-speed autonomy into human-governable operational signals</text>

  <rect x="90" y="230" width="410" height="520" rx="34" fill="#FFFFFF" stroke="#D9E1EC" stroke-width="3"/>
  <text x="295" y="290" text-anchor="middle" fill="#2563EB" font-family="Arial" font-size="34" font-weight="700">Human Layer</text>
  <text x="140" y="360" fill="#172033" font-family="Arial" font-size="25">• Strategic intent</text>
  <text x="140" y="415" fill="#172033" font-family="Arial" font-size="25">• Accountability</text>
  <text x="140" y="470" fill="#172033" font-family="Arial" font-size="25">• Intervention capability</text>
  <text x="140" y="525" fill="#172033" font-family="Arial" font-size="25">• Trust calibration</text>
  <text x="140" y="580" fill="#172033" font-family="Arial" font-size="25">• Meaning and direction</text>

  <rect x="595" y="210" width="410" height="560" rx="34" fill="#EAF1FF" stroke="#93C5FD" stroke-width="3"/>
  <text x="800" y="270" text-anchor="middle" fill="#1D4ED8" font-family="Arial" font-size="34" font-weight="700">Interface Layer</text>
  <text x="645" y="340" fill="#172033" font-family="Arial" font-size="25">• Operational visibility</text>
  <text x="645" y="395" fill="#172033" font-family="Arial" font-size="25">• Escalation signals</text>
  <text x="645" y="450" fill="#172033" font-family="Arial" font-size="25">• Coordination health</text>
  <text x="645" y="505" fill="#172033" font-family="Arial" font-size="25">• Explainable status</text>
  <text x="645" y="560" fill="#172033" font-family="Arial" font-size="25">• Intervention windows</text>
  <text x="645" y="615" fill="#172033" font-family="Arial" font-size="25">• Shared operational language</text>

  <rect x="1100" y="230" width="410" height="520" rx="34" fill="#FFFFFF" stroke="#D9E1EC" stroke-width="3"/>
  <text x="1305" y="290" text-anchor="middle" fill="#16A34A" font-family="Arial" font-size="34" font-weight="700">AI Operational Layer</text>
  <text x="1150" y="360" fill="#172033" font-family="Arial" font-size="25">• Local AI agents</text>
  <text x="1150" y="415" fill="#172033" font-family="Arial" font-size="25">• Autonomous workflows</text>
  <text x="1150" y="470" fill="#172033" font-family="Arial" font-size="25">• Tool execution</text>
  <text x="1150" y="525" fill="#172033" font-family="Arial" font-size="25">• Machine-speed coordination</text>
  <text x="1150" y="580" fill="#172033" font-family="Arial" font-size="25">• Operational outcomes</text>

  <path d="M500 490 C545 490 550 490 595 490" stroke="#2563EB" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <path d="M1005 490 C1050 490 1055 490 1100 490" stroke="#16A34A" stroke-width="6" fill="none" marker-end="url(#arrow2)"/>
  <path d="M1100 650 C970 835 620 835 500 650" stroke="#D97706" stroke-width="5" fill="none" stroke-dasharray="14 12" marker-end="url(#arrow3)"/>

  <text x="800" y="835" text-anchor="middle" fill="#667085" font-family="Arial" font-size="24">The interface does not replace human responsibility — it makes meaningful responsibility possible at machine speed.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2L10 6L2 10" stroke="#2563EB" stroke-width="2" fill="none"/></marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2L10 6L2 10" stroke="#16A34A" stroke-width="2" fill="none"/></marker>
    <marker id="arrow3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2L10 6L2 10" stroke="#D97706" stroke-width="2" fill="none"/></marker>
  </defs>
</svg>
