name: External Signal Intake
description: Capture an external article, post, video, comment, tool or idea for possible RABA review
title: "External signal: "
labels: ["external-signal", "non-canonical", "review-needed"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template when something outside the repository may be relevant to RABA.

        You do **not** need to know why it is relevant before submitting it.

        Human intuition is enough for intake.

        AI or a reviewer may later translate, summarize, classify and connect the signal to RABA.

        Boundary:
        - external signal is not adoption;
        - external interest is not validation;
        - AI summary is not Human Owner approval;
        - no canon, pilot, vendor, partnership, referral or commercial commitment is created by this issue.

  - type: input
    id: source-link
    attributes:
      label: Source link
      description: Paste the post, article, video, website or other source link.
      placeholder: "https://..."
    validations:
      required: true

  - type: textarea
    id: raw-text-optional
    attributes:
      label: Optional copied excerpt or rough text
      description: Optional. Paste a short excerpt only if useful. Do not copy a full article or full post unless you have permission.
      placeholder: "Optional short excerpt / key phrase / title"
    validations:
      required: false

  - type: dropdown
    id: why-submitted
    attributes:
      label: Why are you submitting this?
      description: If unsure, choose intuition only.
      options:
        - Intuition only — AI should assess relevance
        - Looks relevant to RABA governance
        - Looks relevant to AI agents / tools / MCP / sub-agents
        - Looks relevant to responsibility / approval / auditability
        - Looks relevant to public positioning / external communication
        - Looks relevant to product / pilot / implementation
        - Other / unclear
    validations:
      required: true

  - type: textarea
    id: optional-human-note
    attributes:
      label: Optional human note
      description: Optional. You may write in any language. One word is enough.
      placeholder: "Optional: why this caught your attention, even intuitively"
    validations:
      required: false

  - type: textarea
    id: ai-review-section
    attributes:
      label: AI / reviewer classification
      description: To be filled later by AI or reviewer.
      value: |
        ## AI / reviewer classification

        **Language / source accessibility:**
        - [ ] Link accessible
        - [ ] Link requires login or is unavailable
        - [ ] Human-provided excerpt needed

        **Short summary:**

        **RABA relevance:**
        - [ ] No clear relevance
        - [ ] External signal only
        - [ ] Possible working note
        - [ ] Possible mapping / review input
        - [ ] Possible public-facing reference
        - [ ] Possible issue / task

        **Potential RABA concepts:**
        - Action Boundary:
        - Approval State:
        - Governance Gateway:
        - Decision Log:
        - Responsibility Event Stream:
        - Responsibility Management Interface:
        - Authority Drift:
        - Other:

        **Risk / boundary check:**
        - [ ] Do not treat as adoption
        - [ ] Do not treat as endorsement
        - [ ] Do not treat as external validation
        - [ ] Do not create commercial / pilot / vendor / referral commitment
        - [ ] Check copyright / quoting limits
        - [ ] Check factual accuracy before relying on it

        **Recommended action:**
        - [ ] Ignore / no action
        - [ ] Keep as external signal
        - [ ] Add comment / summary only
        - [ ] Create working note draft
        - [ ] Link to existing document
        - [ ] Create follow-up issue
        - [ ] Human Owner decision required
    validations:
      required: false
