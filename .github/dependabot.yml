version: 2

updates:
  # Minimal governance-focused baseline.
  # Additional ecosystems (npm, pip, docker) should be enabled
  # only after confirming they are actively used.

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore"
      include: "scope"
